[package]
name = "markluck"
version = "0.15.0"
description = "MarkLuck — local-first Markdown note-taking tool"
authors = ["MarkLuck"]
license = "MIT"
repository = "https://github.com/jiay98528-dev/MarkLuck"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
base64 = "0.22"
log = "0.4"
tauri = { version = "2.11.2", features = ["tray-icon"] }
tauri-plugin-log = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-single-instance = "2"

# M6-03: File system operations
walkdir = "2"

# M6-04: Full-text search (tantivy)
tantivy = "0.22"

# M6-05: File watcher
notify = "8"

# M7: Recycle bin support
trash = "5"

# M6-06: Template rendering
chrono = "0.4"
regex = "1"
