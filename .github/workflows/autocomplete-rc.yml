name: Public V2S Autocomplete RC

on:
  workflow_dispatch:
    inputs:
      candidate_descriptor:
        description: 'Repository-relative, fully evidenced Public V2S release candidate descriptor'
        required: true
        type: string
      candidate_artifact_run_id:
        description: 'Run id containing the immutable V2S candidate/evidence artifact'
        required: true
        type: string
      candidate_artifact_name:
        description: 'Artifact whose entries preserve repository-relative cache paths'
        required: true
        default: 'autocomplete-v2s-release-candidate'
        type: string

concurrency:
  group: autocomplete-v2s-final-v1
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  autocomplete-v2s-rc:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download immutable V2S candidate and evidence
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.candidate_artifact_name }}
          path: .
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_artifact_run_id }}
          github-token: ${{ github.token }}

      - name: Reject candidate artifacts that modify tracked source
        run: git diff --exit-code

      - name: Install Chromium
        run: pnpm exec playwright install chromium

      - name: Verify the checked-out fail-closed or canonical V2S state
        run: node scripts/verify-autocomplete-v2s-evidence.mjs --mode=ci

      - name: Atomically install the fully evidenced V2S candidate
        shell: pwsh
        env:
          V2S_CANDIDATE_DESCRIPTOR: ${{ inputs.candidate_descriptor }}
        run: pnpm publish-autocomplete-v2s-final --candidate $env:V2S_CANDIDATE_DESCRIPTOR

      - name: Type check
        run: pnpm typecheck

      - name: Lint and format
        run: pnpm lint && pnpm lint:tokens && pnpm format

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Autocomplete production E2E
        run: pnpm test:e2e:autocomplete-rc

      - name: Rust check and tests
        run: cargo check --manifest-path packages/app/src-tauri/Cargo.toml && cargo test --manifest-path packages/app/src-tauri/Cargo.toml

      - name: Build Tauri package
        run: pnpm --filter @jotluck/app tauri:build

      - name: Execute real Tauri WebView smoke
        run: pnpm test:tauri:webview-smoke

      - name: Recompute the canonical V2S release closure
        run: node scripts/release-rc-gate.mjs --autocomplete-only

      - name: Upload installed Public V2S state
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autocomplete-v2s-rc-state
          path: |
            packages/app/public/autocomplete/
          if-no-files-found: error
