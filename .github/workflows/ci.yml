name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_rc_gate:
        description: 'Diagnostic only: generic RC remains fail-closed until evidence protocol v2'
        required: true
        default: false
        type: boolean
      l4_report:
        description: 'Repository-relative installed-app L4 report path'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Token contract check
        run: pnpm lint:tokens

      - name: Format check
        run: pnpm format

      - name: Stylelint
        run: pnpm --filter @jotluck/app lint:style

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify V2S evidence or its fail-closed absence
        run: node scripts/verify-autocomplete-v2s-evidence.mjs --mode=ci

      - name: Run unit tests
        run: pnpm test

      - name: Run coverage
        run: pnpm test:coverage

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/app
          if-no-files-found: ignore

      - name: Build app
        run: pnpm --filter @jotluck/app build

      - name: Verify frozen V1 is absent from the production bundle
        run: pnpm exec tsx scripts/autocomplete-v1-frozen-adapter.ts --check-production-isolation

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, test]

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: pnpm --filter @jotluck/app exec playwright test --project=${{ matrix.browser }} --workers=1 --grep-invert @windows-visual

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}
          path: |
            e2e/report
            packages/app/test-results
            e2e/artifacts
          if-no-files-found: ignore

  e2e-visual-windows:
    name: Windows Visual Regression
    runs-on: windows-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install chromium

      - name: Run Win32-owned visual baselines
        run: pnpm --filter @jotluck/app exec playwright test 23-halo-canvas-theme.spec.ts --project=chromium --workers=1 --grep @windows-visual

      - name: Upload Windows visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-windows
          path: |
            e2e/report
            packages/app/test-results
            e2e/artifacts
          if-no-files-found: ignore

  rust:
    name: Rust Check, Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust check
        run: cargo check --manifest-path packages/app/src-tauri/Cargo.toml

      - name: Rust tests
        run: cargo test --manifest-path packages/app/src-tauri/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cargo audit --file packages/app/src-tauri/Cargo.lock

  tauri-build-windows:
    name: Windows Tauri Build
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [lint-and-typecheck, test, rust]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri installer
        run: pnpm --filter @jotluck/app tauri:build

      - name: Upload Tauri installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jotluck-windows-installer
          path: packages/app/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  release-rc-gate:
    name: Installed-app RC Gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_rc_gate == true }}
    runs-on: windows-latest
    timeout-minutes: 10
    needs: [tauri-build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: jotluck-windows-installer
          path: packages/app/src-tauri/target/release/bundle/nsis

      - name: Run installed-app RC gate
        env:
          JotLuck_L4_REPORT: ${{ inputs.l4_report }}
        run: pnpm release:rc-gate
